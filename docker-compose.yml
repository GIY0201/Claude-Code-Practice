version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: skymind-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: skymind
      POSTGRES_USER: skymind
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skymind_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skymind -d skymind"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skymind-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://skymind:${DB_PASSWORD:-skymind_dev}@db:5432/skymind

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skymind-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
